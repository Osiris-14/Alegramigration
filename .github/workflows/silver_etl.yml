name: Silver ETL Pipeline

# Estrategia de ejecucion (hora UTC / hora RD UTC-4):
#
# FULL SYNC      - 1 vez/dia a las 06:00 UTC (02:00 AM RD)
#                  Regenera bronce + silver completo (~2h)
#
# INCREMENTAL    - 3 veces/dia a las 10, 14, 22 UTC
#   (hora RD)       06am, 10am, 06pm RD
#                  Solo trae registros nuevos desde Alegra (~segundos si no hay nada nuevo)
#                  Usa metadata=true para chequear el total y solo fetchear si hay diff
#
# Manual dispatch: full o incremental, segun necesidad

on:
  schedule:
    # Full sync - 06:00 UTC (02:00 AM RD)
    - cron: '0 6 * * *'
    # Incrementales - 10am, 10am, 6pm RD
    - cron: '0 14 * * *'
    - cron: '0 18 * * *'
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de ejecucion'
        required: false
        default: 'incremental'
        type: choice
        options:
          - full
          - incremental

jobs:
  silver-pipeline:
    runs-on: ubuntu-latest
    name: Silver ETL (${{ github.event_name == 'workflow_dispatch' && inputs.mode || (github.event.schedule == '0 6 * * *' && 'FULL' || 'INCREMENTAL') }})

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determinar modo
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 6 * * *" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=incremental" >> $GITHUB_OUTPUT
          fi

      - name: Run Silver Pipeline
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          ALEGRA_EMAIL: ${{ secrets.ALEGRA_EMAIL }}
          ALEGRA_TOKEN: ${{ secrets.ALEGRA_TOKEN }}
        run: |
          echo ">>> Corriendo en modo: ${{ steps.mode.outputs.mode }}"
          python run_silver_pipeline.py --mode ${{ steps.mode.outputs.mode }}
