name: Silver ETL Pipeline

# Estrategia de ejecucion (hora UTC / hora RD UTC-4):
#
# FULL SYNC      - 1 vez/dia a las 02:00 UTC (10:00 PM RD)
#                  Corre los 5 pasos completos (~2h)
#                  Regenera bronce + silver completo
#
# Manual dispatch: full o incremental, segun necesidad
#   - incremental: solo actualiza bronce (no toca silver)
#   - full: regenera todo
#
# Sin cron incremental: la API de Alegra no filtra bien por fecha
# y un incremental tarda casi lo mismo que un full. Por simplicidad
# el silver se actualiza una vez al dia, en el full de madrugada.

on:
  schedule:
    # Full sync - 02:00 UTC (10pm RD)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de ejecucion'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - incremental

jobs:
  silver-pipeline:
    runs-on: ubuntu-latest
    name: Silver ETL (${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'FULL' }})

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determinar modo
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          else
            echo "mode=full" >> $GITHUB_OUTPUT
          fi

      - name: Run Silver Pipeline
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          ALEGRA_EMAIL: ${{ secrets.ALEGRA_EMAIL }}
          ALEGRA_TOKEN: ${{ secrets.ALEGRA_TOKEN }}
        run: |
          echo ">>> Corriendo en modo: ${{ steps.mode.outputs.mode }}"
          python run_silver_pipeline.py --mode ${{ steps.mode.outputs.mode }}
